    const { useState, useEffect, useRef, createContext, useContext } = React;

    /* ─── API Base ─── */
    const API = '/api';

    /* ─── Auth Context ─── */
    const AuthContext = createContext();
    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [token, setToken] = useState(localStorage.getItem('token'));

      useEffect(() => {
        if (token) {
          fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => setUser(d.user))
            .catch(() => { setToken(null); localStorage.removeItem('token'); });
        }
      }, [token]);

      const login = (tkn, usr) => { setToken(tkn); setUser(usr); localStorage.setItem('token', tkn); };
      const logout = () => { setToken(null); setUser(null); localStorage.removeItem('token'); };
      const updateUser = (usr) => setUser(usr);

      return <AuthContext.Provider value={{ user, token, login, logout, updateUser }}>{children}</AuthContext.Provider>;
    }
    const useAuth = () => useContext(AuthContext);

    function useScrollReveal(deps = []) {
      const scopeRef = useRef(null);

      useEffect(() => {
        const scope = scopeRef.current;
        if (!scope) return;

        const targets = Array.from(scope.querySelectorAll('.scroll-reveal'));
        if (!targets.length) return;

        if (!('IntersectionObserver' in window)) {
          targets.forEach((target) => target.classList.add('is-visible'));
          return;
        }

        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -8% 0px' });

        targets.forEach((target, index) => {
          if (!target.style.getPropertyValue('--reveal-delay')) {
            target.style.setProperty('--reveal-delay', `${Math.min(index * 70, 420)}ms`);
          }
          observer.observe(target);
        });

        return () => observer.disconnect();
      }, deps);

      return scopeRef;
    }

          <circle cx="50" cy="50" r="10" fill="#FFD700" />
          <circle cx="50" cy="50" r="6" fill="#FF6B00" />
          {[...Array(12)].map((_, i) => {
            const angle = (i * 30) * Math.PI / 180;
            const x1 = 50 + 14 * Math.cos(angle);
            const y1 = 50 + 14 * Math.sin(angle);
            const x2 = 50 + 45 * Math.cos(angle);
            const y2 = 50 + 45 * Math.sin(angle);
            const tipAngle1 = angle + 0.25;
            const tipAngle2 = angle - 0.25;
            const mx1 = 50 + 32 * Math.cos(tipAngle1);
            const my1 = 50 + 32 * Math.sin(tipAngle1);
            const mx2 = 50 + 32 * Math.cos(tipAngle2);
            const my2 = 50 + 32 * Math.sin(tipAngle2);
            return (
              <g key={i}>
                <polygon
                  points={`${x1},${y1} ${mx1},${my1} ${x2},${y2} ${mx2},${my2}`}
                  fill="url(#cg)" stroke="#B8860B" strokeWidth="0.5"
                />
              </g>
            );
          })}
          <circle cx="50" cy="50" r="4" fill="#FFF" opacity="0.7" />
        </svg>
      );
    }

        setError(''); setDebugInfo('');
        if (!email.trim() || !password.trim()) {
          setError('Please enter both email and password.');
          setDebugInfo('login blocked: missing email or password');
          return;

        setLoading(true);
        try {
          const res = await fetch(API + '/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          let data = null;
          try {
            data = await res.json();
          } catch (parseErr) {
            data = { message: 'Invalid JSON response from server.' };
          }
          setDebugInfo(`login ${res.status} ${res.ok ? 'OK' : 'ERR'}: ${data.message || ''}`.trim());
          if (!res.ok) throw new Error(data.message);
          login(data.token, data.user);
          goTo('cars');
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      const handleGoogleLogin = () => {
        setError(''); setDebugInfo('');
        if (!window.google) {
          setError('Google Sign-In is loading, please wait a moment and try again.');
          return;
        }
        window.google.accounts.id.initialize({
          client_id: '447956619151-il5mq7a48k9rgb5k0hbr91qkql6r5v0i.apps.googleusercontent.com',
          callback: async (response) => {
            if (!response.credential) { setError('Google Sign-In was cancelled.'); return; }
            setLoading(true);
            try {
              const res = await fetch(API + '/auth/google-signup', {
                method: 'POST',

              }

    /* ─── Sign Up Page ─── */
    function SignUpPage({ goTo }) {
      const { login } = useAuth();
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const validatePassword = (pw) => {
        if (pw.length < 8) return 'Password must be at least 8 characters long.';
        if (!/[!@#$%^&*()_+\-={}\[\]:;"'<>,.?\/\\|`~]/.test(pw)) return 'Password must contain at least one special character (e.g. @, #, !, $).';
        return null;
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setError('');
        const pwError = validatePassword(password);
        if (pwError) { setError(pwError); return; }
        if (password !== confirmPassword) { setError('Passwords do not match.'); return; }

        setLoading(true);
        try {
          const res = await fetch(API + '/auth/signup', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, phone, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          // Auto-login after signup
          const loginRes = await fetch(API + '/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const loginData = await loginRes.json();
          if (loginRes.ok) { login(loginData.token, loginData.user); goTo('cars'); }
          else { goTo('login'); }
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      return (
        <div className="min-h-screen relative overflow-hidden page-shell flex flex-col page-reveal">
          <div className="absolute inset-0 soft-grid opacity-60"></div>
          <div className="absolute -top-24 -left-24 w-80 h-80 orb float-slow rounded-full"></div>
          <div className="absolute bottom-0 right-0 w-[28rem] h-[28rem] orb-teal float-slow rounded-full"></div>
          <div className="flex items-center justify-center gap-4 pt-10 pb-4 relative z-10 fade-up">

            <Chakram size={56} reverse />
          </div>
          <p className="text-center text-gray-600 mb-6 text-sm relative z-10 fade-up-delay">Create your account to unlock premium rides and priority support</p>

          <div className="flex-1 flex items-start justify-center px-4 pb-10 relative z-10">
            <div className="w-full max-w-md surface-card rounded-3xl p-8 fade-up">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-bold text-brand-dark font-display">Create Account</h2>
                <span className="text-xs uppercase tracking-[0.35em] text-brand-blue">Member</span>
              </div>

              {error && <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4">{error}</div>}

              <form onSubmit={handleSignup} className="space-y-4">
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Full Name</label>
                  <input type="text" required value={name} onChange={e => setName(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="Your full name" />
                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Email</label>
                  <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="you@example.com" />
                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">WhatsApp Number</label>
                  <input type="tel" required value={phone} onChange={e => setPhone(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="+91 98765 43210" />
                  <p className="text-xs text-gray-500 mt-1">OTP will be sent to this WhatsApp number</p>
                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Password</label>
                  <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="Min 8 chars, include @#!$" />
                  <p className="text-xs text-gray-500 mt-1">At least 8 characters with one special character (@, #, !, $)</p>
                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Confirm Password</label>
                  <input type="password" required value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="Re-enter password" />
                </div>
                <button type="submit" disabled={loading}
                  className="w-full bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50">
                  {loading ? 'Creating Account...' : 'Sign Up'}
                </button>
              </form>

              <p className="text-center text-gray-600 mt-6 text-sm">
                Already have an account?{' '}
                <button onClick={() => goTo('login')} className="text-brand-yellow hover:underline font-semibold">Login</button>
              </p>
            </div>
          </div>
          <Footer />
        </div>
      );
    }

            <div className="neon-panel rounded-2xl px-5 py-3 mb-8 overflow-hidden scroll-reveal">

                <span className="feature-chip bg-white rounded-full px-3 py-1 border border-emerald-100">Fast pickup assistance</span>
                <span className="feature-chip bg-white rounded-full px-3 py-1 border border-amber-100">Tamil Nadu wide coverage</span>

            <div className="neon-panel rounded-3xl p-6 sm:p-8 mb-10 scroll-reveal" style={{ '--reveal-delay': '60ms' }}>
              <div className="flex items-start justify-between gap-4">
                <div>
                  <p className="text-xs uppercase tracking-[0.25em] text-brand-blue font-semibold">Pricing Slideshow</p>
                  <h3 className="text-2xl font-extrabold text-brand-dark mt-2 font-display">{slides[activeSlide].title}</h3>
                  <p className="text-sm text-gray-600 mt-1">{slides[activeSlide].subtitle}</p>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    type="button"
                    onClick={prevSlide}
                    className="w-10 h-10 rounded-full border border-gray-200 bg-white hover:bg-brand-mist text-brand-dark font-bold transition"
                    aria-label="Previous slide"
                  >
                    ←
                  </button>
                  <button
                    type="button"
                    onClick={nextSlide}
                    className="w-10 h-10 rounded-full border border-gray-200 bg-white hover:bg-brand-mist text-brand-dark font-bold transition"
                    aria-label="Next slide"
                  >
                    →
                  </button>
                </div>
              </div>

              <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-3">
                {slides[activeSlide].points.map((point, index) => (
                  <div key={`${slides[activeSlide].id}-${index}`} className="bg-brand-mist/50 rounded-xl px-4 py-3 text-sm text-gray-700 border border-gray-100">
                    {point}
                  </div>
                ))}

              <div className="mt-7 flex items-center justify-center gap-2" aria-label="Slide indicators">
                {slides.map((slide, index) => (
                  <button

                    type="button"
                    onClick={() => setActiveSlide(index)}
                    aria-label={`Go to slide ${index + 1}`}
                    className={`h-2.5 rounded-full transition-all ${activeSlide === index ? 'w-6 bg-brand-blue' : 'w-2.5 bg-gray-300 hover:bg-gray-400'}`}
                  />

            <div className="neon-panel rounded-3xl p-6 mb-10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 scroll-reveal" style={{ '--reveal-delay': '120ms' }}>
              <div>

                <h3 className="text-2xl font-extrabold text-brand-dark mt-2 font-display">Rental Booking</h3>
                <p className="text-sm text-gray-600 mt-1">Select Sedan, SUV, or Innova and auto-calculate fare by package hours.</p>
              </div>
              <button
                onClick={() => goTo('rental')}
                className="bg-brand-dark hover:bg-brand-blue text-white font-bold px-6 py-3 rounded-xl transition shadow glow-btn"
              >
                Open Rental Booking
              </button>

            <div className="neon-panel rounded-3xl p-8 mb-12 scroll-reveal" style={{ '--reveal-delay': '180ms' }}>
              <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6">
                <div>
                  <p className="text-xs uppercase tracking-[0.3em] text-brand-blue font-semibold">How it works</p>
                  <h3 className="text-2xl font-extrabold text-brand-dark mt-2 font-display">City Rides</h3>

                <button onClick={() => goTo('booking', cars[0])} className="bg-brand-blue hover:bg-blue-800 text-white font-bold px-6 py-3 rounded-xl transition shadow glow-btn">

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mt-8">

                  <h4 className="text-lg font-bold text-brand-dark mt-2">Choose Your Ride</h4>
                  <p className="text-sm text-gray-600 mt-2">Pick Sedan, SUV, or Innova based on your comfort needs.</p>
                </div>
                <div className="bg-brand-mist/50 rounded-2xl p-5">
                  <p className="text-xs uppercase tracking-[0.2em] text-brand-blue font-semibold">Step 2</p>
                  <h4 className="text-lg font-bold text-brand-dark mt-2">Set Route & Fare</h4>
                  <p className="text-sm text-gray-600 mt-2">Enter pickup/drop and get the live estimate instantly.</p>
                </div>
                <div className="bg-brand-mist/50 rounded-2xl p-5">

                  <p className="text-sm text-gray-600 mt-2">We assign the nearest verified driver and send updates.</p>

              </div>

            <div className="grid grid-cols-1 sm:grid-cols-3 gap-8">
              {cars.map((car, index) => (
                <div key={car.name} onClick={() => goTo('booking', car)}
                  className="neon-card tilt-card scroll-reveal rounded-3xl shadow-lg hover:shadow-2xl transform hover:-translate-y-2 transition-all duration-300 cursor-pointer overflow-hidden border border-gray-100 group"
                  style={{ '--reveal-delay': `${260 + index * 90}ms` }}>

                  </div>

                    <h3 className="text-2xl font-bold text-brand-dark font-display">{car.name}</h3>
                    <p className="text-gray-500 text-sm mt-1">{car.desc}</p>
                    <div className="mt-4 inline-flex items-center gap-1 bg-brand-yellow/20 text-brand-dark font-bold px-4 py-2 rounded-full text-lg">
                      ₹{car.rate}<span className="text-sm font-normal text-gray-600">/km</span>

                  </div>
                </div>
              ))}

    }

    /* ─── Booking Page ─── */
    function BookingPage({ goTo, car }) {
      const { token, user } = useAuth();
      const [pickup, setPickup] = useState('');
      const [dropoff, setDropoff] = useState('');
      const [distance, setDistance] = useState(null);
      const [duration, setDuration] = useState(null);
      const [fare, setFare] = useState(null);
      const [booked, setBooked] = useState(false);
      const [contactPhone, setContactPhone] = useState('');
      const [error, setError] = useState('');
      const [calcLoading, setCalcLoading] = useState(false);
      const [loading, setLoading] = useState(false);
      const [bookingStatusMessage, setBookingStatusMessage] = useState('');
      const [pickupSuggestions, setPickupSuggestions] = useState([]);
      const [dropoffSuggestions, setDropoffSuggestions] = useState([]);
      const [pickupCoord, setPickupCoord] = useState(null);
      const [dropoffCoord, setDropoffCoord] = useState(null);
      const pickupRef = useRef(null);
      const dropoffRef = useRef(null);
      const suggestionCacheRef = useRef(new Map());

      const fetchSuggestions = async (query, signal, limit = 6) => {
        const normalizedQuery = query.trim().toLowerCase();
        const cacheKey = `${normalizedQuery}|${limit}`;
        if (suggestionCacheRef.current.has(cacheKey)) {
          return suggestionCacheRef.current.get(cacheKey);
        }

        const tamilNaduViewBox = '76.2,13.6,80.5,8.0';
        const params = new URLSearchParams({
          q: query,
          format: 'jsonv2',
          addressdetails: '1',
          limit: String(limit),
          countrycodes: 'in',
          viewbox: tamilNaduViewBox,
          bounded: '1'
        });
        const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;
        const res = await fetch(url, { headers: { 'Accept-Language': 'en' }, signal });
        const data = await res.json();
        const mapped = data.map(item => ({
          display: item.display_name,
          lat: parseFloat(item.lat),
          lon: parseFloat(item.lon)
        }));
        suggestionCacheRef.current.set(cacheKey, mapped);
        if (suggestionCacheRef.current.size > 80) {
          const firstKey = suggestionCacheRef.current.keys().next().value;
          suggestionCacheRef.current.delete(firstKey);
        }
        return mapped;
      };

      useEffect(() => {
        const term = pickup.trim();
        if (term.length < 2) { setPickupSuggestions([]); return; }
        const controller = new AbortController();
        const suggestionLimit = window.innerWidth < 640 ? 4 : 6;
        const timer = setTimeout(async () => {
          try {
            const results = await fetchSuggestions(term, controller.signal, suggestionLimit);
            setPickupSuggestions(results);
          } catch (err) {
            if (err.name !== 'AbortError') setPickupSuggestions([]);
          }
        }, 180);
        return () => { clearTimeout(timer); controller.abort(); };
      }, [pickup]);

      useEffect(() => {
        const term = dropoff.trim();
        if (term.length < 2) { setDropoffSuggestions([]); return; }
        const controller = new AbortController();
        const suggestionLimit = window.innerWidth < 640 ? 4 : 6;
        const timer = setTimeout(async () => {
          try {
            const results = await fetchSuggestions(term, controller.signal, suggestionLimit);
            setDropoffSuggestions(results);
          } catch (err) {
            if (err.name !== 'AbortError') setDropoffSuggestions([]);
          }
        }, 180);
        return () => { clearTimeout(timer); controller.abort(); };
      }, [dropoff]);

      // Geocode a location name to {lat, lon} using Nominatim (OpenStreetMap)
      const geocode = async (place) => {
        const tamilNaduViewBox = '76.2,13.6,80.5,8.0';

        const pickBest = (results) => {
          if (!results || !results.length) return null;
          const tnMatch = results.find(result => {
            const state = ((result.address && result.address.state) || '').toLowerCase();
            return state.includes('tamil nadu');
          });
          return tnMatch || results[0];
        };

        const runQuery = async (query, useViewBox) => {
          const params = new URLSearchParams({
            q: query,
            format: 'jsonv2',
            addressdetails: '1',
            limit: '5',
            countrycodes: 'in'
          });
          if (useViewBox) {
            params.set('viewbox', tamilNaduViewBox);
            params.set('bounded', '1');
          }
          const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;
          const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
          return res.json();
        };

        const attempts = [
          { query: place, useViewBox: true },
          { query: `${place}, Tamil Nadu`, useViewBox: true },
          { query: place, useViewBox: false }
        ];

        for (const attempt of attempts) {
          const data = await runQuery(attempt.query, attempt.useViewBox);
          const best = pickBest(data);
          if (best) {
            return { lat: parseFloat(best.lat), lon: parseFloat(best.lon), display: best.display_name };
          }
        }

        throw new Error(`Could not find location: "${place}". Try being more specific (e.g. "Kelambakkam, Tamil Nadu").`);
      };

      // Get road distance using OSRM (free routing engine)
      const getRoadDistance = async (from, to) => {
        const url = `https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}?overview=false`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.code !== 'Ok' || !data.routes.length) throw new Error('Could not calculate route between these locations.');
        const km = (data.routes[0].distance / 1000).toFixed(1);
        const mins = Math.round(data.routes[0].duration / 60);
        return { km: parseFloat(km), mins };
      };

      const handleCalculate = async () => {
        if (!pickup.trim() || !dropoff.trim()) { setError('Please enter both pickup and drop locations.'); return; }
        setError(''); setFare(null); setDistance(null); setDuration(null);
        setCalcLoading(true);
        try {
          const [fromCoord, toCoord] = await Promise.all([
            pickupCoord ? pickupCoord : geocode(pickup),
            dropoffCoord ? dropoffCoord : geocode(dropoff)
          ]);
          const route = await getRoadDistance(fromCoord, toCoord);
          setDistance(route.km);
          setDuration(route.mins);
          setFare(Math.round(route.km * car.rate));
        } catch (err) {
          setError(err.message);
        }
        setCalcLoading(false);
      };

      const handleBook = async () => {
        if (!pickup.trim() || !dropoff.trim()) { setError('Please enter pickup and drop locations.'); return; }
        if (!fare) { setError('Please calculate fare first.'); return; }
        if (!token) { setError('Session expired. Please logout and login again.'); return; }
        if (!user?.phone && !contactPhone.trim()) { setError('Please enter a WhatsApp number for contact.'); return; }
        setLoading(true); setError(''); setBookingStatusMessage('');
        try {
          const res = await fetch(API + '/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ pickup, dropoff, distance, fare, estimatedTime: duration, carType: car.name, contactPhone: contactPhone.trim() })
          });
          const data = await res.json();
          if (res.status === 401) {
            setError('Session expired. Please logout and login again.');
            return;
          }
          if (!res.ok) throw new Error(data.message || 'Booking failed - status ' + res.status);
          const warnings = Array.isArray(data.notificationWarnings) ? data.notificationWarnings : [];
          setBookingStatusMessage(warnings.length ? `${data.message} ${warnings.join(' | ')}` : (data.message || 'Ride booked successfully!'));
          setBooked(true);
        } catch (err) { setError('❌ ' + err.message); }
        setLoading(false);
      };

      if (booked) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col page-reveal">
            <Header />
            <div className="flex-1 max-w-lg mx-auto px-4 py-16 text-center w-full relative">
              <button
                type="button"
                onClick={() => setBooked(false)}
                className="absolute left-4 top-6 sm:top-8 w-11 h-11 rounded-full bg-white border border-gray-200 text-brand-dark text-2xl leading-none flex items-center justify-center shadow hover:bg-brand-mist transition"
                aria-label="Back to booking form"
                title="Back"
              >
                ←
              </button>
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-3xl font-extrabold text-green-600 mb-3">Ride Booked!</h2>
              <p className="text-gray-600 mb-2 break-words">Your <span className="font-bold">{car.name}</span> ride from <span className="font-bold">{pickup}</span> to <span className="font-bold">{dropoff}</span> is confirmed.</p>
              {bookingStatusMessage && <p className="text-sm font-semibold text-brand-dark mb-3">{bookingStatusMessage}</p>}
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 my-4 max-w-xs sm:max-w-none mx-auto">
                <div className="bg-white rounded-xl shadow p-4"><p className="text-xs text-gray-500">Distance</p><p className="text-xl font-bold text-brand-dark">{distance} km</p></div>
                <div className="bg-white rounded-xl shadow p-4"><p className="text-xs text-gray-500">Est. Time</p><p className="text-xl font-bold text-brand-dark">{duration} min</p></div>
                <div className="bg-brand-yellow/20 rounded-xl shadow p-4 border-2 border-brand-yellow"><p className="text-xs text-gray-500">Fare</p><p className="text-xl font-bold text-brand-dark">₹{fare}</p></div>
              </div>
              <button onClick={() => goTo('cars')} className="bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold px-8 py-3 rounded-xl transition shadow-lg mt-4">
                Book Another Ride
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen glow-road-bg flex flex-col text-brand-dark page-reveal">
          <Header />
          <div className="flex-1 max-w-lg mx-auto px-4 pt-10 pb-28 sm:pb-10 w-full">
            <button onClick={() => goTo('cars')} className="text-brand-blue hover:underline text-sm mb-6 inline-flex items-center gap-1">
              ← Back to Cars
            </button>

            <div className={`bg-gradient-to-br ${car.color} rounded-2xl p-6 flex items-center gap-6 mb-8 shadow-lg`}>
              <img src={car.image} alt={car.name} className="w-20 h-20 object-contain drop-shadow-lg" />
              <div>
                <h2 className="text-2xl font-extrabold text-white">{car.name}</h2>
                <p className="text-white/80 text-lg">₹{car.rate}/km</p>
              </div>
            </div>

            <div className="sm:hidden bg-white/90 border border-gray-200 rounded-2xl p-3 mb-4 shadow">
              <div className="flex items-center gap-2 text-[11px] font-semibold">
                <span className="px-2 py-1 rounded-full bg-brand-blue/10 text-brand-blue">1 Route</span>
                <span className={`px-2 py-1 rounded-full ${fare !== null ? 'bg-brand-yellow/20 text-brand-dark' : 'bg-gray-100 text-gray-500'}`}>2 Fare</span>
                <span className={`px-2 py-1 rounded-full ${fare !== null ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500'}`}>3 Confirm</span>
              </div>
              <p className="text-xs text-gray-600 mt-2">
                {fare === null ? 'Enter pickup and drop, then tap Calculate.' : 'Fare ready. Tap Confirm Booking below.'}
              </p>
            </div>

            {error && <div className="bg-red-50 border border-red-300 text-red-600 text-sm rounded-lg p-3 mb-4">{error}</div>}

            <div className="neon-panel rounded-3xl p-6 space-y-5">
              <div>
                <label className="block text-gray-700 font-semibold text-sm mb-1">📍 Pickup Location</label>
                <input ref={pickupRef} type="text" value={pickup} onChange={e => { setPickup(e.target.value); setPickupCoord(null); setFare(null); setDistance(null); }}
                  className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                  placeholder="e.g. Chennai, Tamil Nadu" />
                {pickupSuggestions.length > 0 && (
                  <div className="mt-2 rounded-xl border border-gray-200 bg-white shadow-sm overflow-y-auto max-h-56">
                    {pickupSuggestions.map((item, index) => (
                      <button
                        type="button"
                        key={`${item.display}-${index}`}
                        onClick={() => {
                          setPickup(item.display);
                          setPickupCoord({ lat: item.lat, lon: item.lon });
                          setPickupSuggestions([]);
                          setFare(null); setDistance(null); setDuration(null);
                        }}
                        className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-brand-mist"
                      >
                        {item.display}
                      </button>
                    ))}
                  </div>
                )}
                <p className="text-xs text-gray-500 mt-2">Select from suggestions for accurate village-level distance.</p>
              </div>
              <div>
                <label className="block text-gray-700 font-semibold text-sm mb-1">📍 Drop Location</label>
                <input ref={dropoffRef} type="text" value={dropoff} onChange={e => { setDropoff(e.target.value); setDropoffCoord(null); setFare(null); setDistance(null); }}
                  className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                  placeholder="e.g. Madurai, Tamil Nadu" />
                {dropoffSuggestions.length > 0 && (
                  <div className="mt-2 rounded-xl border border-gray-200 bg-white shadow-sm overflow-y-auto max-h-56">
                    {dropoffSuggestions.map((item, index) => (
                      <button
                        type="button"
                        key={`${item.display}-${index}`}
                        onClick={() => {
                          setDropoff(item.display);
                          setDropoffCoord({ lat: item.lat, lon: item.lon });
                          setDropoffSuggestions([]);
                          setFare(null); setDistance(null); setDuration(null);
                        }}
                        className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-brand-mist"
                      >
                        {item.display}
                      </button>
                    ))}
                  </div>
                )}
                <p className="text-xs text-gray-500 mt-2">Pick the correct location from the list for best results.</p>
              </div>
              {!user?.phone && (
                <div>
                  <label className="block text-gray-700 font-semibold text-sm mb-1">📞 WhatsApp Number</label>
                  <input type="tel" value={contactPhone} onChange={e => setContactPhone(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="+91 98765 43210" />
                  <p className="text-xs text-gray-500 mt-1">We will notify you and our team on this number.</p>
                </div>
              )}

              <button onClick={handleCalculate} disabled={calcLoading}
                className="hidden sm:flex w-full bg-brand-blue hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition shadow items-center justify-center gap-2 disabled:opacity-60 glow-btn">
                {calcLoading ? (
                  <><svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg> Calculating route...</>
                ) : '🗺️ Calculate Distance & Fare'}
              </button>

              {fare !== null && distance !== null && (
                <div className="bg-brand-yellow/10 border-2 border-brand-yellow rounded-xl p-5">
                  <p className="text-center text-gray-600 text-sm font-semibold mb-3">Route Details</p>
                  <div className="flex justify-around mb-3">
                    <div className="text-center">
                      <p className="text-xs text-gray-500">Distance</p>
                      <p className="text-2xl font-extrabold text-brand-dark">{distance} km</p>
                    </div>
                    <div className="text-center">
                      <p className="text-xs text-gray-500">Est. Travel Time</p>
                      <p className="text-2xl font-extrabold text-brand-dark">{duration} min</p>
                    </div>
                  </div>
                  <div className="text-center border-t pt-3">
                    <p className="text-gray-600 text-sm">Estimated Fare</p>
                    <p className="text-4xl font-extrabold text-brand-dark">₹{fare}</p>
                    <p className="text-gray-500 text-xs mt-1">{distance} km × ₹{car.rate}/km</p>
                  </div>
                </div>
              )}

              {fare !== null && (
                <button onClick={handleBook} disabled={loading}
                  className="hidden sm:block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50 glow-btn">
                  {loading ? 'Booking...' : '✅ Confirm Booking'}
                </button>
              )}
            </div>
          </div>

          <div
            className="sm:hidden fixed bottom-0 inset-x-0 z-40 p-3 bg-white/95 border-t border-gray-200 backdrop-blur"
            style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}
          >
            <div className="max-w-lg mx-auto flex items-center gap-3">
              {fare !== null ? (
                <div className="flex-1 rounded-xl bg-brand-yellow/15 border border-brand-yellow/40 px-3 py-2">
                  <p className="text-[11px] text-gray-600">Estimated Fare</p>
                  <p className="text-lg font-extrabold text-brand-dark">₹{fare}</p>
                </div>
              ) : (
                <div className="flex-1 rounded-xl bg-gray-100 border border-gray-200 px-3 py-2">
                  <p className="text-[11px] text-gray-600">Next Step</p>
                  <p className="text-sm font-bold text-brand-dark">Calculate Fare</p>
                </div>
              )}

              <button
                type="button"
                onClick={fare === null ? handleCalculate : handleBook}
                disabled={calcLoading || loading}
                className={`px-4 py-3 rounded-xl text-white font-bold shadow-lg disabled:opacity-50 ${fare === null ? 'bg-brand-blue hover:bg-blue-800' : 'bg-green-500 hover:bg-green-600'}`}
              >
                {fare === null
                  ? (calcLoading ? 'Calculating...' : 'Calculate')
                  : (loading ? 'Booking...' : 'Confirm')}
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─── Rental Booking Page ─── */
    function RentalBookingPage({ goTo }) {
      const { token, user } = useAuth();
      const carOptions = {
        Sedan: {},
        SUV: {},
        Innova: {}
      };

      const packageOptionsByCar = {
        Sedan: {
          '4 Hours': { fare: 1200, allowedKm: 40 },
          '8 Hours': { fare: 2400, allowedKm: 75 },
          '1 Day': { fare: 3500, allowedKm: 150 }
        },
        SUV: {
          '4 Hours': { fare: 1500, allowedKm: 40 },
          '8 Hours': { fare: 3000, allowedKm: 75 },
          '1 Day': { fare: 4500, allowedKm: 150 }
        },
        Innova: {
          '4 Hours': { fare: 1500, allowedKm: 40 },
          '8 Hours': { fare: 3000, allowedKm: 75 },
          '1 Day': { fare: 4500, allowedKm: 150 }
        }
      };

      const [selectedCar, setSelectedCar] = useState('Sedan');
      const [showPackageFlow, setShowPackageFlow] = useState(false);
      const [bookingCarType, setBookingCarType] = useState('Sedan');
      const [bookingPackageHours, setBookingPackageHours] = useState('4 Hours');
      const [bookingConfirmed, setBookingConfirmed] = useState(false);
      const [bookingLoading, setBookingLoading] = useState(false);
      const [bookingError, setBookingError] = useState('');
      const [bookingSuccess, setBookingSuccess] = useState(false);
      const [bookingStatusMessage, setBookingStatusMessage] = useState('');
      const [contactPhone, setContactPhone] = useState('');

      const packageOptions = packageOptionsByCar[bookingCarType];

      const startPackageFlow = () => {
        setBookingError('');
        setBookingSuccess(false);
        setBookingStatusMessage('');
        setBookingCarType(selectedCar);
        setBookingPackageHours('4 Hours');
        setBookingConfirmed(false);
        setShowPackageFlow(true);
      };

      const confirmPackageSelection = () => {
        setBookingError('');
        setBookingConfirmed(true);
      };

      const handleBookPackage = async () => {
        if (!token) {
          setBookingError('Session expired. Please login again.');
          return;
        }
        if (!user?.phone && !contactPhone.trim()) {
          setBookingError('Please enter a WhatsApp number.');
          return;
        }

        const selectedPackageData = packageOptionsByCar[bookingCarType][bookingPackageHours];
        const packageMins = bookingPackageHours === '1 Day' ? 24 * 60 : parseInt(bookingPackageHours, 10) * 60;

        setBookingLoading(true);
        setBookingError('');
        try {
          const res = await fetch(API + '/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({
              pickup: 'Rental Package Booking',
              dropoff: 'Rental Package Booking',
              distance: selectedPackageData.allowedKm,
              fare: selectedPackageData.fare,
              estimatedTime: packageMins,
              carType: `${bookingCarType} - ${bookingPackageHours} Package`,
              contactPhone: contactPhone.trim()
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Package booking failed.');
          const warnings = Array.isArray(data.notificationWarnings) ? data.notificationWarnings : [];
          setBookingStatusMessage(warnings.length ? `${data.message} ${warnings.join(' | ')}` : (data.message || 'Package was booked successfully.'));
          setBookingSuccess(true);
          setShowPackageFlow(false);
          setBookingConfirmed(false);
        } catch (err) {
          setBookingError(err.message || 'Package booking failed.');
        }
        setBookingLoading(false);
      };

      return (
        <div className="min-h-screen glow-road-bg flex flex-col text-brand-dark page-reveal">
          <Header />
          <div className="flex-1 max-w-4xl mx-auto px-4 py-10 w-full">
            <button onClick={() => goTo('cars')} className="text-brand-blue hover:underline text-sm mb-6 inline-flex items-center gap-1">
              ← Back to Cars
            </button>

            <div className="neon-panel rounded-3xl p-6 sm:p-8 mb-8">
              <p className="text-xs uppercase tracking-[0.25em] text-brand-blue font-semibold">Rental Booking</p>
              <h2 className="text-3xl sm:text-4xl font-extrabold text-brand-dark mt-2 font-display">Choose Car and Package</h2>
              <p className="text-sm text-gray-600 mt-2">Pick car type and package hours. Fare details are calculated automatically.</p>

              <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="bg-brand-mist/60 rounded-2xl p-4 border border-gray-100">
                  <p className="text-xs uppercase tracking-[0.2em] text-brand-blue font-semibold">Sedan Package Details</p>
                  <p className="text-sm text-gray-700 mt-2">4 Hours: Rs 1200 (40 km)</p>
                  <p className="text-sm text-gray-700">8 Hours: Rs 2400 (75 km)</p>
                  <p className="text-sm text-gray-700">1 Day: Rs 3500 (150 km)</p>
                </div>
                <div className="bg-brand-mist/60 rounded-2xl p-4 border border-gray-100">
                  <p className="text-xs uppercase tracking-[0.2em] text-brand-blue font-semibold">SUV and Innova Package Details</p>
                  <p className="text-sm text-gray-700 mt-2">1 Day: Rs 4500 (150 km)</p>
                  <p className="text-sm text-gray-700">8 Hours: Rs 3000 (75 km)</p>
                  <p className="text-sm text-gray-700">4 Hours: Rs 1500 (40 km)</p>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mt-6">
                {Object.keys(carOptions).map(carName => (
                  <button
                    key={carName}
                    type="button"
                    onClick={() => setSelectedCar(carName)}
                    className={`rounded-2xl px-4 py-4 border text-left transition ${selectedCar === carName ? 'border-brand-yellow bg-brand-yellow/10' : 'border-gray-200 bg-white hover:bg-brand-mist'}`}
                  >
                    <p className="text-lg font-bold text-brand-dark">{carName}</p>
                    <p className="text-xs text-gray-600 mt-1">Rental package pricing only</p>
                  </button>
                ))}
              </div>

              <div className="mt-6">
                <p className="text-sm font-extrabold text-brand-dark">Note: Extra per km - Sedan: Rs 25/km, SUV: Rs 35/km.</p>
              </div>

              <div className="mt-6">
                {!showPackageFlow && !bookingSuccess && (
                  <button
                    type="button"
                    onClick={startPackageFlow}
                    className="bg-brand-dark hover:bg-brand-blue text-white font-bold px-6 py-3 rounded-xl transition shadow glow-btn"
                  >
                    Book Package
                  </button>
                )}

                {bookingSuccess && (
                  <div className="bg-emerald-50 border border-emerald-300 text-emerald-700 rounded-xl p-4 font-semibold">
                    {bookingStatusMessage || 'Package was booked successfully. Customer details have been sent via WhatsApp.'}
                  </div>
                )}

                {showPackageFlow && (
                  <div className="mt-4 bg-brand-mist/40 border border-gray-200 rounded-2xl p-5 space-y-4">
                    <h3 className="text-lg font-bold text-brand-dark">Package Booking</h3>

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Car Type</label>
                      <select
                        value={bookingCarType}
                        onChange={e => {
                          setBookingCarType(e.target.value);
                          setBookingConfirmed(false);
                          setBookingError('');
                        }}
                        className="w-full sm:w-72 px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                      >
                        {Object.keys(carOptions).map(carName => (
                          <option key={carName} value={carName}>{carName}</option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1">Package Hours</label>
                      <select
                        value={bookingPackageHours}
                        onChange={e => {
                          setBookingPackageHours(e.target.value);
                          setBookingConfirmed(false);
                          setBookingError('');
                        }}
                        className="w-full sm:w-72 px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                      >
                        {Object.keys(packageOptions).map(pkg => (
                          <option key={pkg} value={pkg}>{pkg}</option>
                        ))}
                      </select>
                    </div>

                    {!user?.phone && (
                      <div>
                        <label className="block text-sm font-semibold text-gray-700 mb-1">WhatsApp Number</label>
                        <input
                          type="tel"
                          value={contactPhone}
                          onChange={e => setContactPhone(e.target.value)}
                          placeholder="+91 98765 43210"
                          className="w-full sm:w-72 px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                        />
                      </div>
                    )}

                    <div className="text-sm text-gray-700">
                      Selected: <span className="font-bold">{bookingCarType}</span> - <span className="font-bold">{bookingPackageHours}</span> | Fare: <span className="font-bold">Rs {packageOptionsByCar[bookingCarType][bookingPackageHours].fare}</span>
                    </div>

                    {!bookingConfirmed ? (
                      <button
                        type="button"
                        onClick={confirmPackageSelection}
                        className="bg-amber-500 hover:bg-amber-600 text-white font-bold px-5 py-2.5 rounded-xl transition glow-btn"
                      >
                        Confirm Selection
                      </button>
                    ) : (
                      <button
                        type="button"
                        onClick={handleBookPackage}
                        disabled={bookingLoading}
                        className="bg-green-600 hover:bg-green-700 text-white font-bold px-5 py-2.5 rounded-xl transition disabled:opacity-50 glow-btn"
                      >
                        {bookingLoading ? 'Booking Package...' : 'Book Now'}
                      </button>
                    )}

                    {bookingError && (
                      <p className="text-sm text-red-600 font-semibold">{bookingError}</p>
                    )}
                  </div>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }

    function SplashScreen() {
      return (
        <div className="splash-screen flex items-center justify-center px-4">
          <div className="splash-card rounded-3xl p-8 sm:p-10 w-full max-w-xl text-center text-white">
            <div className="flex items-center justify-center gap-4 mb-5">
              <Chakram size={56} />
              <h2 className="text-3xl sm:text-4xl font-extrabold font-display tracking-wide">GRAND DRIVE</h2>
              <Chakram size={56} reverse />
            </div>
            <p className="text-white/90 text-sm sm:text-base">Preparing your premium booking experience...</p>
            <div className="flex items-center justify-center gap-2 mt-6">
              <span className="splash-dot w-2.5 h-2.5 rounded-full bg-white inline-block"></span>
              <span className="splash-dot w-2.5 h-2.5 rounded-full bg-white inline-block" style={{ animationDelay: '0.2s' }}></span>
              <span className="splash-dot w-2.5 h-2.5 rounded-full bg-white inline-block" style={{ animationDelay: '0.4s' }}></span>
            </div>
          </div>
        </div>
      );
    }

    /* ─── App Router ─── */
    function App() {
      const { user } = useAuth();
      const [page, setPage] = useState('login');
      const [selectedCar, setSelectedCar] = useState(null);
      const [showSplash, setShowSplash] = useState(true);

      useEffect(() => {
        const timer = setTimeout(() => setShowSplash(false), 1400);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        if (user && (page === 'login' || page === 'signup')) setPage('cars');
        if (!user && page !== 'login' && page !== 'signup') setPage('login');
      }, [user]);

      const goTo = (pg, data) => {
        if (pg === 'booking' && data) setSelectedCar(data);
        setPage(pg);
      };

      if (showSplash) return <SplashScreen />;

      if (page === 'login') return <LoginPage goTo={goTo} />;
      if (page === 'signup') return <SignUpPage goTo={goTo} />;
      if (page === 'cars') return <CarSelectionPage goTo={goTo} />;
      if (page === 'rental') return <RentalBookingPage goTo={goTo} />;
      if (page === 'booking' && selectedCar) return <BookingPage goTo={goTo} car={selectedCar} />;
      return <LoginPage goTo={goTo} />;
    }

    /* ─── Mount ─── */
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider><App /></AuthProvider>
    );
  </script>
