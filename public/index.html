<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Sora', 'sans-serif']

          colors: {

      }
    }
  </script>
  <style>
    @keyframes spin-chakra { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .chakra-spin { animation: spin-chakra 3s linear infinite; }
    .chakra-spin-reverse { animation: spin-chakra 3s linear infinite reverse; }
    @keyframes floaty { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
    body {
      font-family: 'Sora', sans-serif;
      background: linear-gradient(180deg, #F9F6F0 0%, #EEF2F7 60%, #F9F6F0 100%);
    }
    .page-shell {
      background: radial-gradient(700px 500px at 10% 5%, rgba(200,162,74,0.12), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(15,118,110,0.10), transparent 62%),
                  linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.9) 100%);
    }
    .soft-grid {
      background-image: linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    .surface-card {
      background: #FFFFFF;
      border: 1px solid rgba(231,226,217,0.9);
      box-shadow: 0 24px 60px rgba(15,23,42,0.12);
    }
    .surface-header {
      background: #FFFFFF;
      border-bottom: 1px solid rgba(231,226,217,0.9);
      box-shadow: 0 14px 40px rgba(15,23,42,0.08);
    }
    .surface-footer {
      background: #FFFFFF;
      border-top: 1px solid rgba(231,226,217,0.9);
      box-shadow: 0 -18px 50px rgba(15,23,42,0.06);
    }
    .header-ribbon {
      height: 4px;
      background: linear-gradient(90deg, #C8A24A 0%, #F0D48A 35%, #0F766E 70%, #0F172A 100%);
    }
    .orb {
      background: radial-gradient(circle, rgba(200,162,74,0.25) 0%, rgba(200,162,74,0) 70%);
      filter: blur(2px);
    }
    .orb-teal {
      background: radial-gradient(circle, rgba(15,118,110,0.25) 0%, rgba(15,118,110,0) 70%);
      filter: blur(2px);
    }
    .float-slow { animation: floaty 7s ease-in-out infinite; }
    .fade-up { animation: fadeUp 0.8s ease-out both; }
    .fade-up-delay { animation: fadeUp 0.8s ease-out both; animation-delay: 0.15s; }
  </style>
</head>
  <body class="min-h-screen text-brand-dark antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

    /* ─── API Base ─── */
    const API = '/api';

    /* ─── Auth Context ─── */
    const AuthContext = createContext();
    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [token, setToken] = useState(localStorage.getItem('token'));

      useEffect(() => {
        if (token) {
          fetch(API + '/auth/me', { headers: { Authorization: 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(d => setUser(d.user))
            .catch(() => { setToken(null); localStorage.removeItem('token'); });
        }
      }, [token]);

      const login = (tkn, usr) => { setToken(tkn); setUser(usr); localStorage.setItem('token', tkn); };
      const logout = () => { setToken(null); setUser(null); localStorage.removeItem('token'); };

      return <AuthContext.Provider value={{ user, token, login, logout }}>{children}</AuthContext.Provider>;
    }
    const useAuth = () => useContext(AuthContext);

    /* ─── Sudarshana Chakram SVG ─── */
    function Chakram({ size = 48, reverse = false }) {
      return (
        <svg className={reverse ? 'chakra-spin-reverse' : 'chakra-spin'} width={size} height={size} viewBox="0 0 100 100">
          <defs>
            <radialGradient id="cg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#FFD700" />
              <stop offset="100%" stopColor="#FF8C00" />
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="48" fill="none" stroke="url(#cg)" strokeWidth="3" />
          <circle cx="50" cy="50" r="10" fill="#FFD700" />
          <circle cx="50" cy="50" r="6" fill="#FF6B00" />
          {[...Array(12)].map((_, i) => {
            const angle = (i * 30) * Math.PI / 180;
            const x1 = 50 + 14 * Math.cos(angle);
            const y1 = 50 + 14 * Math.sin(angle);
            const x2 = 50 + 45 * Math.cos(angle);
            const y2 = 50 + 45 * Math.sin(angle);
            const tipAngle1 = angle + 0.25;
            const tipAngle2 = angle - 0.25;
            const mx1 = 50 + 32 * Math.cos(tipAngle1);
            const my1 = 50 + 32 * Math.sin(tipAngle1);
            const mx2 = 50 + 32 * Math.cos(tipAngle2);
            const my2 = 50 + 32 * Math.sin(tipAngle2);
            return (
              <g key={i}>
                <polygon
                  points={`${x1},${y1} ${mx1},${my1} ${x2},${y2} ${mx2},${my2}`}
                  fill="url(#cg)" stroke="#B8860B" strokeWidth="0.5"
                />
              </g>
            );
          })}
          <circle cx="50" cy="50" r="4" fill="#FFF" opacity="0.7" />
        </svg>
      );
    }

    /* ─── Footer Component ─── */
    function Footer() {
      return (
        <footer className="surface-footer text-brand-dark mt-12">
          {/* Top section */}
          <div className="max-w-5xl mx-auto px-4 py-12 grid grid-cols-1 sm:grid-cols-3 gap-8">
            {/* Brand */}
            <div>
              <div className="flex items-center gap-2 mb-3">
                <Chakram size={32} />
                <span className="text-brand-dark font-extrabold text-lg tracking-wide">Sriram Cab Service</span>
              </div>
              <p className="text-gray-600 text-sm leading-relaxed">Your trusted cab service in Tamil Nadu. Safe, reliable, and affordable rides 24/7.</p>
              <div className="flex gap-3 mt-4">
                <a href="https://wa.me/917358498414" target="_blank" className="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-full text-xs font-bold transition flex items-center gap-1">
                  <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.112 1.523 5.84L0 24l6.336-1.491A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.89 0-3.663-.5-5.198-1.373l-.371-.22-3.762.886.938-3.67-.243-.384A9.953 9.953 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                  WhatsApp
                </a>
                <a href="tel:+917358498414" className="bg-brand-dark hover:bg-brand-blue text-white px-3 py-1.5 rounded-full text-xs font-bold transition">📞 Call Now</a>
              </div>
            </div>
            {/* Quick Links */}
            <div>
              <h4 className="text-brand-dark font-bold mb-4 text-sm uppercase tracking-[0.2em]">Our Services</h4>
              <ul className="space-y-2 text-sm text-gray-600">
                <li className="flex items-center gap-2"><span className="text-brand-yellow">🚗</span> City Rides (Mini / Sedan)</li>
                <li className="flex items-center gap-2"><span className="text-brand-yellow">🚙</span> Outstation Trips (SUV / Innova)</li>
                <li className="flex items-center gap-2"><span className="text-brand-yellow">✈️</span> Airport Transfers</li>
                <li className="flex items-center gap-2"><span className="text-brand-yellow">💒</span> Wedding Car Rentals</li>
                <li className="flex items-center gap-2"><span className="text-brand-yellow">🏥</span> Medical Emergency Rides</li>
                <li className="flex items-center gap-2"><span className="text-brand-yellow">🌙</span> Night Rides Available</li>
              </ul>
            </div>
            {/* Contact & Hours */}
            <div>
              <h4 className="text-brand-dark font-bold mb-4 text-sm uppercase tracking-[0.2em]">Contact Us</h4>
              <ul className="space-y-3 text-sm text-gray-600">
                <li className="flex items-start gap-2"><span className="text-brand-yellow mt-0.5">📞</span><div><p className="text-brand-dark font-semibold">+91 73584 98414</p><p className="text-xs">24/7 Booking Helpline</p></div></li>
                <li className="flex items-start gap-2"><span className="text-brand-yellow mt-0.5">📧</span><div><p className="text-brand-dark font-semibold">rsudharshan2004@gmail.com</p><p className="text-xs">For enquiries & support</p></div></li>
                <li className="flex items-start gap-2"><span className="text-brand-yellow mt-0.5">📍</span><div><p className="text-brand-dark font-semibold">Chennai, Tamil Nadu</p><p className="text-xs">Serving all of Tamil Nadu</p></div></li>
                <li className="flex items-start gap-2"><span className="text-brand-yellow mt-0.5">🕐</span><div><p className="text-brand-dark font-semibold">Mon – Sun: 24 Hours</p><p className="text-xs">Always available for you</p></div></li>
              </ul>
            </div>
          </div>
          {/* Bottom bar */}
          <div className="border-t border-gray-200/70 py-4 px-4">
            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
              <p className="text-gray-500 text-xs">© 2026 Sriram Cab Service. All rights reserved.</p>
              <div className="flex items-center gap-4 text-xs text-gray-500">
                <span>🛡️ Safe & Verified Drivers</span>
                <span>💳 Easy Online Booking</span>
                <span>⭐ 4.9 Rating</span>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ─── Header Component ─── */
    function Header() {
      const { user, logout } = useAuth();
      return (
        <header className="sticky top-0 z-50">
          <div className="header-ribbon"></div>
          {/* Main header */}
          <div className="surface-header px-4">
            <div className="max-w-6xl mx-auto flex items-center justify-between py-4">
              <div className="flex items-center gap-3">
                <Chakram size={40} />
                <div>
                  <h1 className="text-xl sm:text-2xl font-extrabold text-brand-dark tracking-wide leading-tight font-display">Sriram Cab Service</h1>
                  <p className="text-gray-500 text-xs hidden sm:block">Premium rides across Tamil Nadu</p>
                </div>
                <Chakram size={40} reverse />
              </div>
              {user && (
                <div className="flex items-center gap-2 sm:gap-3">
                  <div className="hidden sm:flex flex-col items-end">
                    <span className="text-brand-dark text-sm font-semibold">{user.name}</span>
                    <span className="text-gray-500 text-xs">{user.email}</span>
                  </div>
                  <div className="w-9 h-9 rounded-full bg-brand-yellow/30 border border-brand-yellow/50 flex items-center justify-center font-extrabold text-brand-dark text-lg">
                    {user.name ? user.name.charAt(0).toUpperCase() : '?'}
                  </div>
                  <button onClick={logout} className="bg-brand-dark hover:bg-brand-blue text-white text-xs sm:text-sm px-3 py-1.5 rounded-full transition">Logout</button>
                </div>
              )}
            </div>
          </div>
        </header>
      );
    }

    /* ─── Login Page ─── */
    function LoginPage({ goTo }) {
      const { login } = useAuth();
      const [tab, setTab] = useState('password'); // 'password' | 'otp'
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [otpEmail, setOtpEmail] = useState('');
      const [otpCode, setOtpCode] = useState('');
      const [otpSent, setOtpSent] = useState(false);
      const [otpMsg, setOtpMsg] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try {
          const res = await fetch(API + '/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          login(data.token, data.user);
          goTo('cars');
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      const handleGoogleLogin = () => {
        setError('');
        if (!window.google) {
          setError('Google Sign-In is loading, please wait a moment and try again.');
          return;
        }
        window.google.accounts.id.initialize({
          client_id: '447956619151-il5mq7a48k9rgb5k0hbr91qkql6r5v0i.apps.googleusercontent.com',
          callback: async (response) => {
            if (!response.credential) { setError('Google Sign-In was cancelled.'); return; }
            setLoading(true);
            try {
              const res = await fetch(API + '/auth/google-signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.message);
              login(data.token, data.user);
              goTo('cars');
            } catch (err) {
              setError(err.message || 'Google Sign-In failed. Please try again.');
            }
            setLoading(false);
          },
          ux_mode: 'popup',
          cancel_on_tap_outside: true
        });
        window.google.accounts.id.prompt((notification) => {
          if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
            // Fallback: render button in a temporary div
            const tempDiv = document.createElement('div');
            tempDiv.style.display = 'none';
            document.body.appendChild(tempDiv);
            window.google.accounts.id.renderButton(tempDiv, {
              type: 'standard', theme: 'outline', size: 'large'
            });
            tempDiv.querySelector('div[role=button]')?.click();
            setTimeout(() => document.body.removeChild(tempDiv), 3000);
          }
        });
      };

      const handleSendOtp = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true); setOtpMsg('');
        try {
          const res = await fetch(API + '/auth/send-otp', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: otpEmail })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          setOtpSent(true);
          setOtpMsg(data.message);
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      const handleVerifyOtp = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try {
          const res = await fetch(API + '/auth/verify-otp', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: otpEmail, otp: otpCode })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          login(data.token, data.user);
          goTo('cars');
        } catch (err) { setError(err.message); }
        setLoading(false);
      };

      return (
        <div className="min-h-screen relative overflow-hidden page-shell flex flex-col">
          <div className="absolute inset-0 soft-grid opacity-60"></div>
          <div className="absolute -top-24 -left-24 w-80 h-80 orb float-slow rounded-full"></div>
          <div className="absolute bottom-0 right-0 w-[28rem] h-[28rem] orb-teal float-slow rounded-full"></div>
          {/* Brand header for login */}
          <div className="flex items-center justify-center gap-4 pt-10 pb-4 relative z-10 fade-up">
            <Chakram size={56} />
            <h1 className="text-3xl sm:text-5xl font-extrabold text-brand-yellow tracking-wide drop-shadow-lg font-display">
              Sriram Cab Service
            </h1>
            <Chakram size={56} reverse />
          </div>
          <p className="text-center text-gray-600 mb-6 text-sm relative z-10 fade-up-delay">Chauffeur-grade service for every journey across Tamil Nadu</p>

          <div className="flex-1 flex items-start justify-center px-4 pb-10 relative z-10">
            <div className="w-full max-w-md surface-card rounded-3xl p-8 fade-up">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-2xl font-bold text-brand-dark font-display">Welcome Back</h2>
                <span className="text-xs uppercase tracking-[0.35em] text-brand-blue">Premium Access</span>
              </div>

              {error && <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4">{error}</div>}

              {/* Google Sign-In Button */}
              <button onClick={handleGoogleLogin} className="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 text-gray-800 font-semibold py-3 rounded-xl hover:bg-gray-50 transition mb-4 shadow">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33.5 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.2-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.4 0-9.9-3.5-11.3-8.5l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C36.8 39.2 44 34 44 24c0-1.3-.2-2.7-.4-3.9z"/></svg>
                Sign in with Google
              </button>

              <div className="flex items-center gap-3 mb-4">
                <div className="flex-1 h-px bg-gray-200"></div>
                <span className="text-gray-500 text-sm">or</span>
                <div className="flex-1 h-px bg-gray-200"></div>
              </div>

              {/* Login Method Tabs */}
              <div className="flex rounded-xl overflow-hidden mb-5 border border-gray-200">
                <button onClick={() => { setTab('password'); setError(''); }} className={`flex-1 py-2 text-sm font-semibold transition ${tab === 'password' ? 'bg-brand-yellow text-brand-dark' : 'bg-white text-gray-600 hover:bg-brand-mist'}`}>
                  Password
                </button>
                <button onClick={() => { setTab('otp'); setError(''); setOtpSent(false); setOtpMsg(''); }} className={`flex-1 py-2 text-sm font-semibold transition ${tab === 'otp' ? 'bg-brand-yellow text-brand-dark' : 'bg-white text-gray-600 hover:bg-brand-mist'}`}>
                  OTP (WhatsApp)
                </button>
              </div>

              {tab === 'password' && (
                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="block text-gray-600 text-sm mb-1">Email</label>
                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                      placeholder="you@example.com" />
                  </div>
                  <div>
                    <label className="block text-gray-600 text-sm mb-1">Password</label>
                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                      className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                      placeholder="Enter your password" />
                  </div>
                  <button type="submit" disabled={loading}
                    className="w-full bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50">
                    {loading ? 'Logging in...' : 'Login'}
                  </button>
                </form>
              )}

              {tab === 'otp' && (
                <div className="space-y-4">
                  {otpMsg && <div className="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg p-3">{otpMsg}</div>}
                  {!otpSent ? (
                    <form onSubmit={handleSendOtp} className="space-y-4">
                      <div>
                        <label className="block text-gray-600 text-sm mb-1">Registered Email</label>
                        <input type="email" required value={otpEmail} onChange={e => setOtpEmail(e.target.value)}
                          className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                          placeholder="you@example.com" />
                      </div>
                      <button type="submit" disabled={loading}
                        className="w-full bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50">
                        {loading ? 'Sending...' : 'Send OTP to WhatsApp'}
                      </button>
                    </form>
                  ) : (
                    <form onSubmit={handleVerifyOtp} className="space-y-4">
                      <div>
                        <label className="block text-gray-600 text-sm mb-1">Enter OTP</label>
                        <input type="text" required maxLength="6" value={otpCode} onChange={e => setOtpCode(e.target.value)}

    /* ─── Sign Up Page ─── */
    function SignUpPage({ goTo }) {
      const { login } = useAuth();
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const validatePassword = (pw) => {
        if (pw.length < 8) return 'Password must be at least 8 characters long.';
        if (!/[!@#$%^&*()_+\-={}\[\]:;"'<>,.?\/\\|`~]/.test(pw)) return 'Password must contain at least one special character (e.g. @, #, !, $).';
        return null;
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        setError('');
        const pwError = validatePassword(password);
        if (pwError) { setError(pwError); return; }
        if (password !== confirmPassword) { setError('Passwords do not match.'); return; }

        setLoading(true);
        try {
          const res = await fetch(API + '/auth/signup', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, phone, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          // Auto-login after signup
          const loginRes = await fetch(API + '/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const loginData = await loginRes.json();
          if (loginRes.ok) { login(loginData.token, loginData.user); goTo('cars'); }
          else { goTo('login'); }
        } catch (err) { setError(err.message); }
        setLoading(false);

      return (

                    placeholder="Your full name" />

                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="you@example.com" />

                    placeholder="+91 98765 43210" />

                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Password</label>
                  <input type="password" required value={password} onChange={e => setPassword(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="Min 8 chars, include @#!$" />
                  <p className="text-xs text-gray-500 mt-1">At least 8 characters with one special character (@, #, !, $)</p>
                </div>
                <div>
                  <label className="block text-gray-600 text-sm mb-1">Confirm Password</label>
                  <input type="password" required value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="Re-enter password" />
                </div>
                <button type="submit" disabled={loading}
                  className="w-full bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50">

    /* ─── Booking Page ─── */
    function BookingPage({ goTo, car }) {
      const { token, user } = useAuth();
      const [pickup, setPickup] = useState('');
      const [dropoff, setDropoff] = useState('');
      const [distance, setDistance] = useState(null);
      const [duration, setDuration] = useState(null);
      const [fare, setFare] = useState(null);
      const [booked, setBooked] = useState(false);
      const [contactPhone, setContactPhone] = useState('');
      const [error, setError] = useState('');
      const [calcLoading, setCalcLoading] = useState(false);
      const [loading, setLoading] = useState(false);
      const [pickupSuggestions, setPickupSuggestions] = useState([]);
      const [dropoffSuggestions, setDropoffSuggestions] = useState([]);
      const [pickupCoord, setPickupCoord] = useState(null);
      const [dropoffCoord, setDropoffCoord] = useState(null);
      const pickupRef = useRef(null);
      const dropoffRef = useRef(null);

      const fetchSuggestions = async (query, signal) => {
        const tamilNaduViewBox = '76.2,13.6,80.5,8.0';
        const params = new URLSearchParams({
          q: query,
          format: 'jsonv2',
          addressdetails: '1',
          limit: '6',
          countrycodes: 'in',
          viewbox: tamilNaduViewBox,
          bounded: '1'
        });
        const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;
        const res = await fetch(url, { headers: { 'Accept-Language': 'en' }, signal });
        const data = await res.json();
        return data.map(item => ({
          display: item.display_name,
          lat: parseFloat(item.lat),
          lon: parseFloat(item.lon)
        }));
      };

      useEffect(() => {
        const term = pickup.trim();
        if (term.length < 3) { setPickupSuggestions([]); return; }
        const controller = new AbortController();
        const timer = setTimeout(async () => {
          try {
            const results = await fetchSuggestions(term, controller.signal);
            setPickupSuggestions(results);
          } catch (err) {
            if (err.name !== 'AbortError') setPickupSuggestions([]);
          }
        }, 350);
        return () => { clearTimeout(timer); controller.abort(); };
      }, [pickup]);

      useEffect(() => {
        const term = dropoff.trim();
        if (term.length < 3) { setDropoffSuggestions([]); return; }
        const controller = new AbortController();
        const timer = setTimeout(async () => {
          try {
            const results = await fetchSuggestions(term, controller.signal);
            setDropoffSuggestions(results);
          } catch (err) {
            if (err.name !== 'AbortError') setDropoffSuggestions([]);
          }
        }, 350);
        return () => { clearTimeout(timer); controller.abort(); };
      }, [dropoff]);

      // Geocode a location name to {lat, lon} using Nominatim (OpenStreetMap)
      const geocode = async (place) => {
        const tamilNaduViewBox = '76.2,13.6,80.5,8.0';

        const pickBest = (results) => {
          if (!results || !results.length) return null;
          const tnMatch = results.find(result => {
            const state = ((result.address && result.address.state) || '').toLowerCase();
            return state.includes('tamil nadu');
          });
          return tnMatch || results[0];
        };

        const runQuery = async (query, useViewBox) => {
          const params = new URLSearchParams({
            q: query,
            format: 'jsonv2',
            addressdetails: '1',
            limit: '5',
            countrycodes: 'in'
          });
          if (useViewBox) {
            params.set('viewbox', tamilNaduViewBox);
            params.set('bounded', '1');
          }
          const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;
          const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
          return res.json();
        };

        const attempts = [
          { query: place, useViewBox: true },
          { query: `${place}, Tamil Nadu`, useViewBox: true },
          { query: place, useViewBox: false }
        ];

        for (const attempt of attempts) {
          const data = await runQuery(attempt.query, attempt.useViewBox);
          const best = pickBest(data);
          if (best) {
            return { lat: parseFloat(best.lat), lon: parseFloat(best.lon), display: best.display_name };
          }
        }

        throw new Error(`Could not find location: "${place}". Try being more specific (e.g. "Kelambakkam, Tamil Nadu").`);
      };

      // Get road distance using OSRM (free routing engine)
      const getRoadDistance = async (from, to) => {
        const url = `https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}?overview=false`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.code !== 'Ok' || !data.routes.length) throw new Error('Could not calculate route between these locations.');
        const km = (data.routes[0].distance / 1000).toFixed(1);
        const mins = Math.round(data.routes[0].duration / 60);
        return { km: parseFloat(km), mins };
      };

      const handleCalculate = async () => {
        if (!pickup.trim() || !dropoff.trim()) { setError('Please enter both pickup and drop locations.'); return; }
        setError(''); setFare(null); setDistance(null); setDuration(null);
        setCalcLoading(true);
        try {
          const [fromCoord, toCoord] = await Promise.all([
            pickupCoord ? pickupCoord : geocode(pickup),
            dropoffCoord ? dropoffCoord : geocode(dropoff)
          ]);
          const route = await getRoadDistance(fromCoord, toCoord);
          setDistance(route.km);
          setDuration(route.mins);
          setFare(Math.round(route.km * car.rate));
        } catch (err) {
          setError(err.message);
        }
        setCalcLoading(false);
      };

      const handleBook = async () => {
        if (!pickup.trim() || !dropoff.trim()) { setError('Please enter pickup and drop locations.'); return; }
        if (!fare) { setError('Please calculate fare first.'); return; }
        if (!token) { setError('Session expired. Please logout and login again.'); return; }
        if (!user?.phone && !contactPhone.trim()) { setError('Please enter a WhatsApp number for contact.'); return; }
        setLoading(true); setError('');
        try {
          const res = await fetch(API + '/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body: JSON.stringify({ pickup, dropoff, distance, fare, estimatedTime: duration, carType: car.name, contactPhone: contactPhone.trim() })
          });
          const data = await res.json();
          if (res.status === 401) {
            setError('Session expired. Please logout and login again.');
            return;
          }
          if (!res.ok) throw new Error(data.message || 'Booking failed - status ' + res.status);
          setBooked(true);
        } catch (err) { setError('❌ ' + err.message); }
        setLoading(false);
      };

      if (booked) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col">
            <Header />
            <div className="flex-1 max-w-lg mx-auto px-4 py-16 text-center w-full">
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-3xl font-extrabold text-green-600 mb-3">Ride Booked!</h2>
              <p className="text-gray-600 mb-2">Your <span className="font-bold">{car.name}</span> ride from <span className="font-bold">{pickup}</span> to <span className="font-bold">{dropoff}</span> is confirmed.</p>
              <div className="flex justify-center gap-6 my-4">
                <div className="bg-white rounded-xl shadow p-4"><p className="text-xs text-gray-500">Distance</p><p className="text-xl font-bold text-brand-dark">{distance} km</p></div>
                <div className="bg-white rounded-xl shadow p-4"><p className="text-xs text-gray-500">Est. Time</p><p className="text-xl font-bold text-brand-dark">{duration} min</p></div>
                <div className="bg-brand-yellow/20 rounded-xl shadow p-4 border-2 border-brand-yellow"><p className="text-xs text-gray-500">Fare</p><p className="text-xl font-bold text-brand-dark">₹{fare}</p></div>
              </div>
              <button onClick={() => goTo('cars')} className="bg-brand-yellow hover:bg-yellow-500 text-brand-dark font-bold px-8 py-3 rounded-xl transition shadow-lg mt-4">
                Book Another Ride
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-b from-brand-sand via-white to-brand-mist flex flex-col text-brand-dark">
          <Header />
          <div className="flex-1 max-w-lg mx-auto px-4 py-10 w-full">
            <button onClick={() => goTo('cars')} className="text-brand-blue hover:underline text-sm mb-6 inline-flex items-center gap-1">
              ← Back to Cars
            </button>

            <div className={`bg-gradient-to-br ${car.color} rounded-2xl p-6 flex items-center gap-6 mb-8 shadow-lg`}>
              <img src={car.image} alt={car.name} className="w-20 h-20 object-contain drop-shadow-lg" />
              <div>
                <h2 className="text-2xl font-extrabold text-white">{car.name}</h2>
                <p className="text-white/80 text-lg">₹{car.rate}/km</p>
              </div>
            </div>

            {error && <div className="bg-red-50 border border-red-300 text-red-600 text-sm rounded-lg p-3 mb-4">{error}</div>}

            <div className="bg-white rounded-3xl shadow-lg p-6 space-y-5">
              <div>
                <label className="block text-gray-700 font-semibold text-sm mb-1">📍 Pickup Location</label>
                <input ref={pickupRef} type="text" value={pickup} onChange={e => { setPickup(e.target.value); setPickupCoord(null); setFare(null); setDistance(null); }}
                  className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                  placeholder="e.g. Chennai, Tamil Nadu" />
                {pickupSuggestions.length > 0 && (
                  <div className="mt-2 rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
                    {pickupSuggestions.map((item, index) => (
                      <button
                        type="button"
                        key={`${item.display}-${index}`}
                        onClick={() => {
                          setPickup(item.display);
                          setPickupCoord({ lat: item.lat, lon: item.lon });
                          setPickupSuggestions([]);
                          setFare(null); setDistance(null); setDuration(null);
                        }}
                        className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-brand-mist"
                      >
                        {item.display}
                      </button>
                    ))}
                  </div>
                )}
                <p className="text-xs text-gray-500 mt-2">Select from suggestions for accurate village-level distance.</p>
              </div>
              <div>
                <label className="block text-gray-700 font-semibold text-sm mb-1">📍 Drop Location</label>
                <input ref={dropoffRef} type="text" value={dropoff} onChange={e => { setDropoff(e.target.value); setDropoffCoord(null); setFare(null); setDistance(null); }}
                  className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                  placeholder="e.g. Madurai, Tamil Nadu" />
                {dropoffSuggestions.length > 0 && (
                  <div className="mt-2 rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
                    {dropoffSuggestions.map((item, index) => (
                      <button
                        type="button"
                        key={`${item.display}-${index}`}
                        onClick={() => {
                          setDropoff(item.display);
                          setDropoffCoord({ lat: item.lat, lon: item.lon });
                          setDropoffSuggestions([]);
                          setFare(null); setDistance(null); setDuration(null);
                        }}
                        className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-brand-mist"
                      >
                        {item.display}
                      </button>
                    ))}
                  </div>
                )}
                <p className="text-xs text-gray-500 mt-2">Pick the correct location from the list for best results.</p>
              </div>
              {!user?.phone && (
                <div>
                  <label className="block text-gray-700 font-semibold text-sm mb-1">📞 WhatsApp Number</label>
                  <input type="tel" value={contactPhone} onChange={e => setContactPhone(e.target.value)}
                    className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-yellow"
                    placeholder="+91 98765 43210" />
                  <p className="text-xs text-gray-500 mt-1">We will notify you and our team on this number.</p>
                </div>
              )}

              <button onClick={handleCalculate} disabled={calcLoading}
                className="w-full bg-brand-blue hover:bg-blue-800 text-white font-bold py-3 rounded-xl transition shadow flex items-center justify-center gap-2 disabled:opacity-60">
                {calcLoading ? (
                  <><svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg> Calculating route...</>
                ) : '🗺️ Calculate Distance & Fare'}
              </button>

              {fare !== null && distance !== null && (
                <div className="bg-brand-yellow/10 border-2 border-brand-yellow rounded-xl p-5">
                  <p className="text-center text-gray-600 text-sm font-semibold mb-3">Route Details</p>
                  <div className="flex justify-around mb-3">
                    <div className="text-center">
                      <p className="text-xs text-gray-500">Distance</p>
                      <p className="text-2xl font-extrabold text-brand-dark">{distance} km</p>
                    </div>
                    <div className="text-center">
                      <p className="text-xs text-gray-500">Est. Travel Time</p>
                      <p className="text-2xl font-extrabold text-brand-dark">{duration} min</p>
                    </div>
                  </div>
                  <div className="text-center border-t pt-3">
                    <p className="text-gray-600 text-sm">Estimated Fare</p>
                    <p className="text-4xl font-extrabold text-brand-dark">₹{fare}</p>
                    <p className="text-gray-500 text-xs mt-1">{distance} km × ₹{car.rate}/km</p>
                  </div>
                </div>
              )}

              {fare !== null && (
                <button onClick={handleBook} disabled={loading}
                  className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg disabled:opacity-50">
                  {loading ? 'Booking...' : '✅ Confirm Booking'}
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ─── App Router ─── */
    function App() {
      const { user } = useAuth();
      const [page, setPage] = useState('login');
      const [selectedCar, setSelectedCar] = useState(null);

      useEffect(() => {
        if (user && (page === 'login' || page === 'signup')) setPage('cars');
        if (!user && page !== 'login' && page !== 'signup') setPage('login');
      }, [user]);

      const goTo = (pg, data) => {
        if (pg === 'booking' && data) setSelectedCar(data);
        setPage(pg);
      };

      if (page === 'login') return <LoginPage goTo={goTo} />;
      if (page === 'signup') return <SignUpPage goTo={goTo} />;
      if (page === 'cars') return <CarSelectionPage goTo={goTo} />;
      if (page === 'booking' && selectedCar) return <BookingPage goTo={goTo} car={selectedCar} />;
      return <LoginPage goTo={goTo} />;
    }

    /* ─── Mount ─── */
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider><App /></AuthProvider>
    );
  </script>
